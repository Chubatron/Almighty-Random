- uses: actions/checkout@v4

      - name: Cache Buildozer global directory 
        uses: actions/cache@v4
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android release
          buildozer_version: stable

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: ${{ steps.buildozer.outputs.filename }}
name: Build Android AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.37
          pip install --upgrade pip

      - name: Build with Buildozer
        run: |
          buildozer android release
        env:
          ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
          ANDROIDNDK: /home/runner/.buildozer/android/platform/android-ndk-r25b
          ANDROIDAPI: 31
          ANDROIDMINAPI: 21

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: ./bin/*.aab
